<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <style>
        body{
            text-align: center;
            margin-top: 50px;
        }
        button{
            border: 2px solid black;
            background-color: red;
            color: white;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        #roundScore,#score,#winnerDecision{
            margin-top: 20px;
            font-size: 20px;

        }
    </style>
</head>
<body>
    <div id="box1">
        <button id="Rock">Rock</button>
        <button id="Paper">Paper</button>
        <button id="Scissors">Scissors</button>
    </div>
    <div id="roundScore"></div>
    <div id="score"></div>
    <div id="winnerDecision"></div>
        
    <script>
        const rockBtn = document.getElementById("Rock")
        const paperBtn = document.getElementById("Paper")
        const scissorBtn = document.getElementById("Scissors")

        
        rockBtn.addEventListener("click", ()=>{
            playRound("rock")
        })
        paperBtn.addEventListener("click", ()=>{
            playRound("paper")
        })            
        scissorBtn.addEventListener("click", ()=>{
            playRound("scissors")
        })

        //random number is generated and getting the computer choice accordingly
        function getComputerChoice(){
            const randomNum = Math.floor(Math.random()*3);

            if(randomNum === 0){
                return "rock";
            }
            else if(randomNum === 1){
                return "paper";
            }
            else {
                return "scissors";
            }
        }

            let humanScore = 0;
            let computerScore = 0;

            const roundScore = document.getElementById("roundScore")
            const score = document.getElementById("score")
            const winnerDecision = document.getElementById("winnerDecision")
            
            
            function playRound(humanChoice){ 
                if(humanScore ===5 || computerScore ===5){
                    return
                }
                humanChoice = humanChoice.toLowerCase();
                computerChoice = getComputerChoice();
                
                if(humanChoice === computerChoice){
                    roundScore.textContent = `Tie ! Both Choose ${humanChoice.toUpperCase()}`
                  
                }

                else if((humanChoice === "rock" && computerChoice === "scissors") || (humanChoice === "scissors" && computerChoice === "paper")
                ||(humanChoice === "paper" && computerChoice === "rock")){
                    humanScore++
                    roundScore.textContent = `Human Choose ${humanChoice.toUpperCase()} which beats Computer Choice ${computerChoice.toUpperCase()}. So, Human wins this round.`
                }

                else{
                    computerScore++
                    roundScore.textContent = `Computer Choose ${computerChoice.toUpperCase()} which beats Human Choice ${humanChoice.toUpperCase()}. So,computer wins this round.`
                   
                }
                score.textContent = `Human Score: ${humanScore} || Computer Score: ${computerScore}`

                if(humanScore === 5){
                    winnerDecision.textContent = "Human win the game"
                }
                if(computerScore === 5){
                    winnerDecision.textContent = "Computer win the game"
                }   
        }

    </script>
    
</body>
</html>
