<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palindrome Checker</title>
</head>
<body>
    <h1>Palidrome Checker</h1>
    <input id="1" type="text" placeholder="Type Something">
    <button onclick="check()">Check</button>

    <script>
        const input = document.getElementById("1");

        function reverseData(str){
            return str.split("").reverse().join("");
        }

        function check(){
            const value = input.value.toLowerCase();
            const reverseValue = reverseData(value).toLowerCase();

            if(value == reverseValue){
                alert("Palindrome")
            }
            else{
                alert("Not a Palindrome")
            }
        }
    </script>
</body>
</html>
